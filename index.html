<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Đơn Nghỉ Phép</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg: #F2F4F7; --surface: #FFFFFF; --primary: #1A6FE8; --text: #1A1D23; --muted: #6B7280; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 16px; color: var(--text);
    }
    .card {
      background: var(--surface); border-radius: 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08); width: 100%; max-width: 480px;
      padding: 48px 28px; text-align: center;
    }
    .spinner {
      display: inline-block; width: 24px; height: 24px;
      border: 3px solid rgba(26,111,232,.2);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 13px; color: var(--muted); margin-top: 12px; }
  </style>
</head>
<body>
<div class="card">
  <div class="spinner"></div>
  <p>Đang mở form...</p>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbx54kvjD6zZP3X-PeJYzuJ1Za2Y6J3NTl1ata6B-sfDICV5yGh3Sbx6xSp5TJtTVDY7Gg/exec';
const params = new URLSearchParams(window.location.search);
const token = params.get('token');

if (token) {
  window.location.href = GAS_URL + '?action=verifytoken&token=' + encodeURIComponent(token);
} else {
  document.querySelector('p').textContent = 'Không tìm thấy token. Vui lòng mở từ SeaTalk.';
}
</script>
</body>
</html>
